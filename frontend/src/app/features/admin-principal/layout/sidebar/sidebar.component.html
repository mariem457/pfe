<aside class="sidebar">

  <div class="brand centered">
    <img class="brand__logo" src="/images/logo.png" alt="WiseTrash logo">

    
    <div class="brand__tag">Gestion intelligente des déchets</div>
  </div>

  <nav class="nav">

    <a
      [routerLink]="['/admin/gestion-utilisateurs']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }">
      <span class="material-icons nav-icon">group</span>
      <span class="nav-label">Gestion des utilisateurs</span>
    </a>

    <a
      [routerLink]="['/admin/gestion-poubelles']"
      routerLinkActive="active">
      <span class="material-icons nav-icon">storage</span>
      <span class="nav-label">Gestion des poubelles</span>
    </a>

    <a
      [routerLink]="['/admin/controle-systeme']"
      routerLinkActive="active">
      <span class="material-icons nav-icon">dns</span>
      <span class="nav-label">Contrôle du système</span>
    </a>

    <a
      [routerLink]="['/admin/securite']"
      routerLinkActive="active">
      <span class="material-icons nav-icon">shield</span>
      <span class="nav-label">Sécurité</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <div class="divider"></div>

    <div class="user">
      <div class="avatar">AD</div>

      <div class="user__meta">
        <div class="user__name">Administrateur</div>
        <div class="user__email">admin&#64;ville.gov</div>
      </div>
    </div>

    <a class="logout" href="javascript:void(0)" (click)="logout()">
  <span class="material-icons logout-icon">logout</span>
  <span>Déconnexion</span>
</a>
  </div>

</aside>
