<section class="forgot-page">
  <div class="forgot-card">

    <div class="logo-wrap">
      <img src="/images/logo.png" alt="WiseTrash logo" class="logo-img" />
    </div>

    <p class="forgot-subtitle">
      Entrez votre adresse e-mail pour recevoir le code de réinitialisation
    </p>

    <form (ngSubmit)="submit()">
      <label for="email">Adresse e-mail</label>

      <div class="input-group" [class.input-error]="hasEmailError">
        <span class="material-icons">mail</span>
        <input
          id="email"
          type="text"
          name="email"
          [(ngModel)]="email"
          placeholder="Votre adresse e-mail"
          autocomplete="off"
        />
      </div>

      <div *ngIf="hasEmailError" class="error-message detailed-error">
        <span class="material-icons">error</span>
        <span>{{ emailDetailedError }}</span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
      </button>

      <p *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" class="error-message server-error">
        {{ errorMessage }}
      </p>

      <a routerLink="/login" class="back-link">
        <span class="material-icons">arrow_back</span>
        Retour à la connexion
      </a>
    </form>
  </div>
</section>
