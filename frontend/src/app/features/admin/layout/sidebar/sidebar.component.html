<aside class="sidebar">

  <!-- TOP / BRAND -->
  <div class="brand">
    <div class="brand__logo-wrap">
      <img src="/images/logo.png" alt="WiseTrash Logo" class="brand__logo" />
    </div>

    <div class="brand__text">
      
      <div class="brand__tag">Gestion intelligente des déchets</div>
    </div>
  </div>

  <nav class="nav">
    <a routerLink="dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>grid_view</mat-icon>
      <span>Vue d’ensemble</span>
    </a>

    <a routerLink="bins" routerLinkActive="active">
      <mat-icon>delete_outline</mat-icon>
      <span>Bennes intelligentes</span>
    </a>

    <a routerLink="/municipality/missions" routerLinkActive="active" class="nav-link-with-icon">
      <svg
        class="nav-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M9 11l3 3L22 4"></path>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
      </svg>
      <span>Missions</span>
    </a>

    <a routerLink="trucks" routerLinkActive="active">
      <mat-icon>local_shipping</mat-icon>
      <span>Camions</span>
    </a>

    <a routerLink="optimisation" routerLinkActive="active">
      <mat-icon>psychology</mat-icon>
      <span>Optimisation</span>
    </a>

    

    <a routerLink="parametres" routerLinkActive="active">
      <mat-icon>settings</mat-icon>
      <span>Paramètres</span>
    </a>

    <a routerLink="rapport" routerLinkActive="active">
      <mat-icon>assessment</mat-icon>
      <span>Rapports</span>
    </a>

    <a routerLink="public-reports" routerLinkActive="active">
      <mat-icon>public</mat-icon>
      <span>Rapports publics</span>
    </a>
  </nav>

  <!-- BOTTOM / FOOTER -->
  <div class="sidebar-footer">
    <div class="divider"></div>
<div class="user">
  <div class="avatar">MU</div>
  <div class="user__meta">
    <div class="user__name">Interface municipalité</div>
  </div>
</div>
    <a class="logout" href="javascript:void(0)" (click)="onLogout($event)">
      <mat-icon>logout</mat-icon>
      <span>Déconnexion</span>
    </a>
  </div>

</aside>
