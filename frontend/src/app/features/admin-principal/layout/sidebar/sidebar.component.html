<aside class="sidebar">

  <div class="brand">
    <div class="brand__icon">
      <mat-icon>delete</mat-icon>
    </div>

    <div class="brand__text">
      <div class="brand__name">Intello Trash</div>
      <div class="brand__tag">Smart Waste Management</div>
    </div>
  </div>

  <nav class="nav">

    <a
      [routerLink]="['/admin/gestion-utilisateurs']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>group</mat-icon>
      <span>Gestion des utilisateurs</span>
    </a>

    <a
      [routerLink]="['/admin/gestion-poubelles']"
      routerLinkActive="active">
      <mat-icon>storage</mat-icon>
      <span>Gestion des poubelles</span>
    </a>

    <a
      [routerLink]="['/admin/controle-systeme']"
      routerLinkActive="active">
      <mat-icon>dns</mat-icon>
      <span>Contrôle du système</span>
    </a>

    <a
      [routerLink]="['/admin/securite']"
      routerLinkActive="active">
      <mat-icon>shield</mat-icon>
      <span>Sécurité</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <div class="divider"></div>

    <div class="user">
      <div class="avatar">AD</div>
      <div class="user__meta">
        <div class="user__name">Admin User</div>
        <div class="user__email">admincity.gov</div>
      </div>
    </div>

    <a class="logout" href="javascript:void(0)">
      <mat-icon>logout</mat-icon>
      <span>Log Out</span>
    </a>
  </div>

</aside>
