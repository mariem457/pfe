<section class="forgot-page">
  <div class="forgot-card">

    <div class="logo-wrap">
      <img src="/images/logo.png" alt="WiseTrash logo" class="logo-img" />
    </div>

    <p class="forgot-subtitle">Entrez votre email pour recevoir le lien de réinitialisation</p>

    <form (ngSubmit)="submit()">
      <label for="usernameOrEmail">Nom d'utilisateur ou email</label>

      <div class="input-group">
        <span class="material-icons">person</span>
        <input
          id="usernameOrEmail"
          type="text"
          name="usernameOrEmail"
          [(ngModel)]="usernameOrEmail"
          placeholder="Votre nom d'utilisateur ou email"
          autocomplete="off"
          required
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading || !usernameOrEmail.trim()">
        {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
      </button>

      <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

      <a routerLink="/login" class="back-link">
        <span class="material-icons">arrow_back</span>
        Retour à la connexion
      </a>
    </form>
  </div>
</section>
