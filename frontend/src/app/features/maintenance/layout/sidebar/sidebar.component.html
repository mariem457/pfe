<aside class="sidebar">

  <div class="brand centered">
    <div class="brand__logo-wrap">
      <img class="brand__logo" src="/images/logo.png" alt="WiseTrash logo">
    </div>
    <div class="brand__tag">Gestion intelligente des déchets</div>
  </div>

  <nav class="nav">

    <a
      [routerLink]="['/maintenance']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }">
      <span class="material-icons nav-icon">dashboard</span>
      <span class="nav-label">Dashboard</span>
    </a>

    <a
      [routerLink]="['/maintenance/batteries']"
      routerLinkActive="active">
      <span class="material-icons nav-icon">battery_alert</span>
      <span class="nav-label">État Batteries</span>
    </a>

    <a
      [routerLink]="['/maintenance/capteurs']"
      routerLinkActive="active">
      <span class="material-icons nav-icon">sensors</span>
      <span class="nav-label">État Capteurs</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <div class="divider"></div>

    <div class="user">
      <div class="avatar">MT</div>

      <div class="user__meta">
        <div class="user__name">Maintenance</div>
        <div class="user__email">maintenance&#64;ville.gov</div>
      </div>
    </div>

    <a class="logout" href="javascript:void(0)" (click)="logout()">
      <span class="material-icons logout-icon">logout</span>
      <span>Déconnexion</span>
    </a>
  </div>

</aside>
