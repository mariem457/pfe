<section class="forgot-page">
  <div class="forgot-card">
    <div class="logo-circle">🗑</div>

    <h1>Mot de passe oublié</h1>

    <p class="desc">
      Entrez votre nom d'utilisateur ou votre email pour recevoir les instructions de réinitialisation.
    </p>

    <form (ngSubmit)="submit()">
      <label>Nom d'utilisateur ou email</label>
      <div class="input-group">
        <span class="material-icons">person</span>
        <input
          type="text"
          name="usernameOrEmail"
          [(ngModel)]="usernameOrEmail"
          placeholder="Votre nom d'utilisateur ou email"
          required
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading || !usernameOrEmail.trim()">
        {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
      </button>

      <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

      <a routerLink="/login" class="back-link">← Retour à la connexion</a>
    </form>
  </div>
</section>
