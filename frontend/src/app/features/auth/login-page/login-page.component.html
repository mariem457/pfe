<section class="login-page">
  <div class="login-card">

    <div class="logo-circle">🗑</div>
    <h2 class="brand">WiseTrash</h2>
    <p class="subtitle">Gestion Intelligente des Déchets</p>

    <h1>Bon Retour</h1>
    <p class="desc">Connectez-vous pour accéder à votre tableau de bord</p>

    <form (ngSubmit)="login()">

      <label>Email ou Username</label>
      <div class="input-group">
        <span class="material-icons">person</span>
        <input
          type="text"
          name="usernameOrEmail"
          [(ngModel)]="usernameOrEmail"
          placeholder="admin@ville.gov ou admin"
          required
        />
      </div>

      <label>Mot de passe</label>
      <div class="input-group" [class.active]="showPassword">
        <span class="material-icons">lock</span>

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          placeholder="•••••••"
          required
        />

        <button
          type="button"
          class="eye-btn"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
        >
          <span class="material-icons">
            {{ showPassword ? 'visibility_off' : 'visibility' }}
          </span>
        </button>
      </div>

      <div class="options">
        <label class="remember">
          <input
            type="checkbox"
            name="rememberMe"
            [(ngModel)]="rememberMe"
          />
          <span>Se souvenir de moi</span>
        </label>

        <a href="javascript:void(0)" (click)="forgotPassword()">
          Mot de passe oublié ?
        </a>
      </div>

      <button type="submit" class="btn-login">
        Se connecter →
      </button>

      <p *ngIf="errorMessage" class="login-error">
        {{ errorMessage }}
      </p>

      <a routerLink="/" class="back-link">
        ← Retour à l'accueil
      </a>

    </form>
  </div>
</section>
