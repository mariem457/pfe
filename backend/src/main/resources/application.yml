spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://ep-dry-art-aldkcxqo-pooler.c-3.eu-central-1.aws.neon.tech:5432/neondb?sslmode=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_PKXo1Bgs6lyA}
    hikari:
      connection-timeout: 60000
      validation-timeout: 5000
      initialization-fail-timeout: 0

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8082}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway,mappings

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: TRACE
    org.springframework.boot.context.properties: DEBUG
    com.zaxxer.hikari: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:mariemhamdiTAKWABENHADJslimeNgenielogicielhahakopolhsbxsvsvdyvzsgm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  file:
    upload-dir: uploads

twilio:
  sid: ${TWILIO_SID:}
  token: ${TWILIO_TOKEN:}
  phone: ${TWILIO_PHONE:}

mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:backend-wisetrash}